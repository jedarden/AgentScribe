# NEEDLE workspace configuration
# Workspace: /home/coding/AgentScribe

agent:
  default: claude-code-glm-5-1
  timeout: 900

strands:
  pluck:
    enabled: true
    exclude_labels:
      - deferred
      - human
      - blocked
  explore:
    enabled: true
    workspaces:
      - /home/coding/ai-code-battle
      - /home/coding/spaxel
      - /home/coding/mta-my-way
      - /home/coding/domain-check
  weave:
    enabled: true
    max_beads_per_run: 3
    cooldown_hours: 24
    doc_patterns:
      - "README*"
      - "docs/**/*"
  unravel:
    enabled: true
    max_beads_per_run: 3
    cooldown_hours: 168
  pulse:
    enabled: true
    cooldown_hours: 48
    severity_threshold: 3
    scanners:
      - name: clippy
        command: "cargo clippy --all-targets -- -D warnings 2>&1"
      - name: test
        command: "cargo test 2>&1"

verification:
  - /home/coding/.needle/hooks/verify-changes.sh

prompt:
  context_files:
    - docs/plan.md
  instructions: |
    You are working on AgentScribe, a Rust CLI tool that archives, indexes, and extracts
    intelligence from conversation logs across multiple coding agents (Claude Code, Aider,
    OpenCode, Codex, Cursor, Windsurf).

    IMPORTANT: You must ONLY work within /home/coding/AgentScribe/. Do not read, write, or
    explore files outside this directory. All source code, tests, and documentation live here.

    Architecture:
    - Rust binary using Clap (CLI), Tantivy (full-text search), Tokio (async), Serde (JSON/TOML)
    - Plugin-based scraper framework with format parsers: JSONL, Markdown, JSON-tree
    - Enrichment pipeline: outcome detection, error fingerprinting, anti-patterns, solution extraction
    - Analytics: recurring problems, agent effectiveness, auto-generated rules, weekly digest

    Rules:
    - Read docs/plan.md for the full architecture and phase breakdown before starting any bead
    - Run `cargo clippy --all-targets -- -D warnings` and `cargo test` before closing a bead
    - Run `cargo fmt` before closing a bead
    - No `unwrap()` or `expect()` in non-test code — use `?` with `anyhow`
    - All public functions return `Result<T>`
    - Follow existing code patterns in src/
    - Write tests alongside implementation
  templates:
    pluck: |
      ## Workflow

      You are a coding agent. Complete the task below, then close the bead.

      Steps:
      1. Read the task description and context below
      2. Implement the required changes in {workspace_path}
      3. Commit your work: `git commit -am "brief description of what was done"`
      4. Push: `git push`
      5. Close the bead: `br close {bead_id} --body "brief summary of what was implemented"`

      If you cannot complete the task — do NOT close the bead. It will be retried automatically.

      ---

      ## Task: {bead_title}

      {bead_body}

      ## Rules

      {workspace_instructions}

      ## Context

      {context_file_contents}

      Bead ID: {bead_id}

